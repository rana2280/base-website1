<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/style.css" />
    <title>Recover</title>
  </head>
  <body>
    <div class="container">
      <div class="recover">
        <div class="recover__logo-content">
          <img class="logo" src="./images/Logo.svg" alt="logo" />
          <h2 class="title">Recover</h2>
        </div>

        <form class="form" action="./login.html">
          <label class="label__title" for="email">Email Address</label>
          <input
            class="input"
            type="email"
            id="email"
            name="email"
            placeholder="example@gmail.com"
          />

          <button class="recover__button button" type="submit">
            Reset Your Password
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
