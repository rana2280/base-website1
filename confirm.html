<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/style.css" />
    <title>Confirm</title>
  </head>
  <body>
    <div class="container">
      <div class="confirm">
        <div class="successful">
          <img class="thumbs-up" src="./images/thumbs up.svg" alt="thumbs up" />
          <img
            class="celebration"
            src="./images/celebration.svg"
            alt="celebration"
          />
        </div>

        <h2 class="message">Your account successfully created.</h2>

        <button class="confirm__button button">Go to Home</button>
      </div>
    </div>
  </body>
</html>
